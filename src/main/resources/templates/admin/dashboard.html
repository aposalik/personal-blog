<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

<header class="bg-white border-b border-gray-200 py-5 mb-10">
    <div class="max-w-4xl mx-auto px-4 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900">Admin Dashboard</h1>
        <div class="flex gap-3">
            <a th:href="@{/admin/add}"
               class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
                + New Article
            </a>
            <a th:href="@{/admin/logout}"
               class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-4 py-2 rounded-lg transition">
                Logout
            </a>
        </div>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4">
    <div th:if="${#lists.isEmpty(articles)}" class="text-gray-400 text-center py-20">
        No articles yet. Create your first one!
    </div>

    <div th:each="article : ${articles}" class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4 flex items-center justify-between">
        <div>
            <p class="text-xs text-gray-400 mb-1" th:text="${article.date}"></p>
            <h3 class="text-lg font-semibold text-gray-900" th:text="${article.title}"></h3>
        </div>
        <div class="flex items-center gap-3">
            <a th:href="@{/admin/edit/{slug}(slug=${article.slug})}"
               class="text-sm text-blue-600 hover:underline font-medium">Edit</a>

            <form th:action="@{/admin/delete/{slug}(slug=${article.slug})}" method="post">
                <input type="hidden" th:name="_csrf" th:value="${_csrf.token}"/>
                <button type="submit"
                        class="text-sm text-red-500 hover:underline font-medium"
                        onclick="return confirm('Delete this article?')">
                    Delete
                </button>
            </form>
        </div>
    </div>
</main>

</body>
</html>
